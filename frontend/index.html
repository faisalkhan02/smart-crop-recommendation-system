<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Crop Recommendation & Farm Advisory System</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>🌱 Smart Crop Recommendation &amp; Farm Advisory System</h1>
  <p>Enter your soil and climate conditions to get an AI-powered crop recommendation.</p>
</header>

<main>
  <section class="form-card">
    <h2>Soil &amp; Climate Details</h2>
    <form id="cropForm">
      <div class="grid">
        <div class="field">
          <label for="N">Nitrogen (N) <span>kg/ha</span></label>
          <input type="number" step="0.01" id="N" name="N" placeholder="e.g. 90" required>
        </div>
        <div class="field">
          <label for="P">Phosphorus (P) <span>kg/ha</span></label>
          <input type="number" step="0.01" id="P" name="P" placeholder="e.g. 42" required>
        </div>
        <div class="field">
          <label for="K">Potassium (K) <span>kg/ha</span></label>
          <input type="number" step="0.01" id="K" name="K" placeholder="e.g. 43" required>
        </div>
        <div class="field">
          <label for="temperature">Temperature <span>°C</span></label>
          <input type="number" step="0.01" id="temperature" name="temperature" placeholder="e.g. 20.8" required>
        </div>
        <div class="field">
          <label for="humidity">Humidity <span>%</span></label>
          <input type="number" step="0.01" id="humidity" name="humidity" placeholder="e.g. 82" required>
        </div>
        <div class="field">
          <label for="ph">Soil pH</label>
          <input type="number" step="0.01" id="ph" name="ph" placeholder="e.g. 6.5" required>
        </div>
        <div class="field">
          <label for="rainfall">Rainfall <span>mm</span></label>
          <input type="number" step="0.01" id="rainfall" name="rainfall" placeholder="e.g. 202" required>
        </div>
      </div>
      <button type="submit" id="submitBtn">🔍 Recommend Crop</button>
    </form>
  </section>

  <section class="result-card" id="resultCard" style="display:none;">
    <h2>Recommendation</h2>
    <div class="result-main">
      <div class="crop-name" id="cropName"></div>
      <div class="confidence" id="confidence"></div>
    </div>

    <div class="top3" id="top3"></div>

    <div class="advisory" id="advisory"></div>

    <button id="downloadBtn">📄 Download PDF Report</button>
  </section>

  <section class="error-card" id="errorCard" style="display:none;"></section>
</main>

<footer>
  <p>Major Project — AI-Powered Smart Crop Recommendation & Farm Advisory System</p>
</footer>

<script src="script.js"></script>
</body>
</html>
